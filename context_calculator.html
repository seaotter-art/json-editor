<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #f0f4f8;
  --surface:       #ffffff;
  --surface2:      #e4eaf2;
  --border:        #c8d4e4;
  --border2:       #a8bcd8;
  --text:          #0f1e30;
  --text-muted:    #4a6080;
  --text-dim:      #7a98b8;
  --navy:          #1e3a5f;
  --navy-light:    #dce8f5;
  --navy-border:   #8ab0d4;
  --yellow:        #f5c400;
  --yellow-dark:   #c49800;
  --yellow-bg:     rgba(245,196,0,0.12);
  --yellow-border: rgba(245,196,0,0.45);
  --danger:        #c0392b;
  --danger-light:  #fdf0ee;
  --success:       #1a6e3a;
  --success-light: #e8f7ee;
  --warn:          #b06000;
  --warn-light:    #fdf6e8;
  --tape: repeating-linear-gradient(-45deg,
    transparent, transparent 7px,
    rgba(245,196,0,0.22) 7px, rgba(245,196,0,0.22) 14px);
  --mono: 'Courier New', Courier, monospace;
  --font: 'Noto Sans KR', sans-serif;
}

html, body {
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  padding: 32px 16px 80px;
}

.wrap { max-width: 640px; margin: 0 auto; }

/* ── 페이지 헤더 ── */
.page-header {
  background: #0f1e30;
  border-bottom: 3px solid var(--yellow);
  border-radius: 10px 10px 0 0;
  position: relative;
  overflow: hidden;
  margin-bottom: 0;
}
.page-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: repeating-linear-gradient(90deg,
    var(--yellow) 0px, var(--yellow) 18px,
    #0f1e30 18px, #0f1e30 26px);
}
.page-header-inner {
  padding: 18px 20px 14px;
}
.page-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #fff;
}
.page-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.08em;
  margin-top: 3px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-top: 3px solid var(--navy);
  padding: 14px 16px;
  margin-bottom: 9px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.card:first-of-type {
  border-radius: 0 0 4px 4px;
  border-top: 1.5px solid var(--border);
}

.card-label {
  font-size: 0.63rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 11px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.sn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 17px; height: 17px;
  background: var(--yellow-dark);
  color: #fff;
  font-size: 0.62rem;
  font-weight: 800;
  flex-shrink: 0;
  border-radius: 2px;
}

/* ── 업로드 존 ── */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: 2px;
  padding: 22px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  background: var(--bg);
}
.upload-zone:hover,
.upload-zone.drag {
  border-color: var(--navy);
  background: var(--navy-light);
}
.upload-zone input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.upload-zone p {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.upload-zone p strong { color: var(--navy); }
.upload-zone .sub2 {
  font-size: 0.73rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.file-badge {
  display: none;
  margin-top: 9px;
  padding: 6px 12px;
  background: var(--success-light);
  border: 1.5px solid #a5d6a7;
  border-radius: 2px;
  font-size: 0.78rem;
  color: var(--success);
  font-weight: 700;
}
.file-badge.show { display: inline-block; }

/* ── textarea ── */
textarea {
  width: 100%;
  height: 96px;
  font-family: var(--mono);
  font-size: 0.76rem;
  padding: 9px 11px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border-color 0.12s;
  line-height: 1.7;
  border-radius: 2px;
}
textarea:focus { border-color: var(--navy); box-shadow: 0 0 0 2px rgba(42,111,173,0.15); }
textarea::placeholder { color: var(--text-dim); }
.hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

/* ── 파싱 결과 ── */
.parsed {
  display: none;
  margin-top: 9px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  padding: 9px 11px;
  border-radius: 2px;
}
.parsed.show { display: block; }
.t-row { display: flex; justify-content: space-between; font-size: 0.77rem; padding: 2px 0; }
.t-name { color: var(--text-muted); }
.t-val  { font-family: var(--mono); font-weight: 700; color: var(--navy); }
.t-div  { border-top: 1px solid var(--border); margin: 5px 0; }
.t-total {
  display: flex; justify-content: space-between;
  font-size: 0.83rem; font-weight: 700; padding: 2px 0;
}

/* ── 진행 바 ── */
.prog-wrap { margin-top: 8px; }
.prog-meta {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--text-muted);
  margin-bottom: 4px; letter-spacing: 0.04em;
}
.prog-track {
  height: 10px;
  background: var(--border);
  overflow: hidden;
  position: relative;
  border-radius: 2px;
}
.prog-track::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--tape);
}
.prog-fill {
  height: 100%;
  transition: width 0.35s, background 0.25s;
  position: relative; z-index: 1;
  border-radius: 2px;
}

/* ── MAX CTX 입력 ── */
.ctx-row { display: flex; align-items: center; gap: 8px; }
.ctx-row label { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; font-weight: 600; }
input[type=number] {
  width: 130px;
  padding: 6px 9px;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  font-size: 0.86rem;
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
}
input[type=number]:focus { border-color: var(--navy); box-shadow: 0 0 0 2px rgba(42,111,173,0.15); }
.ctx-unit { font-size: 0.72rem; color: var(--text-dim); }

/* ── 실행 버튼 ── */
.run-btn {
  width: 100%;
  padding: 12px;
  background: var(--yellow);
  color: #0f1e30;
  border: none;
  border-radius: 2px;
  font-size: 0.88rem;
  font-weight: 500;
  font-family: var(--font);
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  margin-bottom: 9px;
}
.run-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--tape);
  opacity: 0;
  transition: opacity 0.15s;
}
.run-btn:hover:not(:disabled)::after { opacity: 1; }
.run-btn:hover:not(:disabled) { background: #fdd000; }
.run-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  background: var(--border);
  color: var(--text-dim);
  box-shadow: none;
}

/* ── 결과 영역 ── */
.results { display: none; }
.results.show { display: block; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 6px;
  margin-bottom: 9px;
}
.stat-box {
  padding: 10px 11px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  border-radius: 2px;
}
.stat-box .sl {
  font-size: 0.6rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 3px; font-weight: 700;
}
.stat-box .sv {
  font-size: 0.92rem; font-weight: 700;
  font-family: var(--mono); color: var(--text);
}
.stat-box.ok  { background: var(--success-light); border-color: #a5d6a7; }
.stat-box.ok  .sv { color: var(--success); }
.stat-box.warn { background: var(--warn-light); border-color: #f0c87a; }
.stat-box.warn .sv { color: var(--warn); }
.stat-box.danger { background: var(--danger-light); border-color: #f5a99e; }
.stat-box.danger .sv { color: var(--danger); }

/* ── 가이드 ── */
.guide {
  padding: 12px 14px;
  font-size: 0.81rem;
  line-height: 1.9;
  margin-bottom: 9px;
  border-radius: 2px;
}
.guide.safe {
  background: var(--success-light);
  border: 1.5px solid #a5d6a7;
  color: #1b5e20;
  border-left: 4px solid var(--success);
}
.guide.warn {
  background: var(--warn-light);
  border: 1.5px solid #f0c87a;
  color: #7a4000;
  border-left: 4px solid var(--warn);
}
.guide.over {
  background: var(--danger-light);
  border: 1.5px solid #f5a99e;
  color: #7f1d1d;
  border-left: 4px solid var(--danger);
}
.guide h4 { font-size: 0.87rem; font-weight: 800; margin-bottom: 6px; }
code {
  background: rgba(0,0,0,0.07);
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 0.78rem;
  border-radius: 2px;
}

/* ── 메시지 테이블 ── */
.msg-section {
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 9px;
  border-radius: 2px;
}
.msg-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 12px;
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
  font-size: 0.67rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted);
}
.msg-table-wrap { max-height: 320px; overflow-y: auto; }
.msg-table-wrap::-webkit-scrollbar { width: 4px; }
.msg-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
th {
  padding: 5px 10px;
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
  text-align: left;
  font-size: 0.63rem; color: var(--text-dim);
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}
td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }

tr.del td  { background: var(--yellow-bg); color: #7a5a00; border-bottom-color: var(--yellow-border); }
tr.keep td { background: var(--navy-light); color: #1e3a5f; }
tr.del td:first-child,
tr.keep td:first-child { font-weight: 700; font-family: var(--mono); }

.role-badge {
  display: inline-block;
  padding: 1px 6px;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.03em;
  border-radius: 2px;
}
.role-user { background: var(--navy-light); color: var(--navy); border: 1px solid var(--navy-border); }
.role-char { background: #e0eaf6; color: #1e3a5f; border: 1px solid #90b4d8; }
.preview-text { color: var(--text-muted); font-size: 0.73rem; }

/* ── 오버랩 박스 ── */
.overlap-box {
  margin-bottom: 8px;
  padding: 10px 12px;
  background: var(--yellow-bg);
  border: 1.5px solid var(--yellow-border);
  border-radius: 2px;
}
.overlap-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.overlap-toggle {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.8rem; color: var(--text-muted); font-weight: 600;
  cursor: pointer; user-select: none;
}
.overlap-toggle input[type=checkbox] {
  width: 15px; height: 15px;
  accent-color: var(--yellow-dark);
  cursor: pointer; flex-shrink: 0;
}
.overlap-count {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto;
}
.overlap-count label { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; }
.overlap-count input[type=number] {
  width: 62px; padding: 4px 7px; font-size: 0.82rem;
  border: 1.5px solid var(--border); border-radius: 2px;
  background: var(--surface); color: var(--text);
  font-family: var(--mono); outline: none;
}
.overlap-count input[type=number]:focus { border-color: var(--yellow-dark); }
.overlap-desc {
  font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; line-height: 1.6;
}

/* ── 다운로드 버튼 ── */
.dl-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.dl-btn {
  padding: 12px 10px;
  border: none;
  border-radius: 2px;
  font-size: 0.84rem; font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  letter-spacing: 0.02em;
  line-height: 1.5;
  transition: filter 0.12s, transform 0.1s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.12);
  width: 100%;
}
.dl-btn:hover:not(:disabled) {
  filter: brightness(1.06);
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.dl-btn small {
  display: block;
  font-size: 0.65rem; font-weight: 400;
  opacity: 0.82; margin-top: 3px;
}
.dl-btn.dl-archive { background: var(--navy); color: #fff; }
.dl-btn.dl-fresh   { background: var(--yellow); color: #0f1e30; }

/* ── 알림 배너 ── */
#cc-notif {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: #0f1e30; color: var(--yellow);
  font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
  padding: 9px 22px;
  border-radius: 3px;
  border-left: 4px solid var(--yellow);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 99999;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
#cc-notif.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
#cc-notif[data-level=err] { background: var(--danger); color: #fff; border-left-color: #8b0000; }

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .dl-row    { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-title">📦 Context Calculator</div>
      <div class="page-sub">컨텍스트 초과 시 채팅 이사 — 과거백업 / 새시작 파일 분리</div>
    </div>
  </div>

  <!-- Step 1: JSON 업로드 -->
  <div class="card" style="border-radius:0 0 4px 4px; border-top:1.5px solid var(--border); margin-top:0;">
    <div class="card-label"><span class="sn">1</span> 채팅 JSON 업로드</div>
    <div class="upload-zone" id="zone">
      <input type="file" id="jsonFile" accept=".json">
      <p><strong>클릭하여 선택</strong>하거나 드래그</p>
      <p class="sub2">RisuAI .json 파일</p>
    </div>
    <div class="file-badge" id="badge"></div>
  </div>

  <!-- Step 2: 토큰 붙여넣기 -->
  <div class="card">
    <div class="card-label"><span class="sn">2</span> 토큰 사용량 붙여넣기</div>
    <textarea id="tokenPaste" placeholder="Character Persistant&#10;1516 Tokens&#10;Character Dynamic&#10;0 Tokens&#10;Current Chat&#10;4214 Tokens&#10;Prompt Template&#10;11728 Tokens"></textarea>
    <p class="hint">앱의 토큰 정보를 그대로 붙여넣으세요.</p>
    <div class="parsed" id="parsed">
      <div id="tRows"></div>
      <div class="t-div"></div>
      <div class="t-total">
        <span>TOTAL</span>
        <span id="tTotal" style="font-family:var(--mono);color:var(--yellow)"></span>
      </div>
      <div class="prog-wrap">
        <div class="prog-meta">
          <span>컨텍스트 사용률</span>
          <span id="progPct"></span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" id="progFill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 3: 최대 컨텍스트 -->
  <div class="card">
    <div class="card-label"><span class="sn">3</span> 최대 컨텍스트</div>
    <div class="ctx-row">
      <label>MAX CONTEXT</label>
      <input type="number" id="maxCtx" value="150000">
      <span class="ctx-unit">tokens</span>
    </div>
  </div>

  <button class="run-btn" id="runBtn" disabled>견적 문의하기</button>

  <!-- 결과 -->
  <div class="results" id="results">
    <div class="card" style="margin-top:0;">
      <div class="card-label">분석 결과</div>
      <div class="stat-grid" id="statGrid"></div>
      <div id="guide"></div>

      <!-- 메시지 테이블 -->
      <div class="msg-section" id="msgSection" style="display:none">
        <div class="msg-head">
          <span>메시지 목록</span>
          <span id="msgCount"></span>
        </div>
        <div class="msg-table-wrap">
          <table>
            <thead><tr><th>#</th><th>역할</th><th>미리보기</th><th>구분</th></tr></thead>
            <tbody id="msgBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 다운로드 버튼 -->
      <div id="dlSection" style="display:none; margin-top:9px;">
        <div class="overlap-box">
          <div class="overlap-row">
            <label class="overlap-toggle">
              <input type="checkbox" id="overlapOn">
              새시작에 앞 메시지 이어 붙이기
            </label>
            <div class="overlap-count">
              <label for="overlapN">개수</label>
              <input type="number" id="overlapN" value="10" min="1" max="100" disabled>
            </div>
          </div>
          <div class="overlap-desc" id="overlapDesc">
            체크 시: 새시작 시작 지점 <strong>앞</strong> 메시지를 N개 포함해 생성합니다.
          </div>
        </div>
        <div class="dl-row">
          <button class="dl-btn dl-archive" onclick="downloadSplit('keep')">
            🗂 과거백업 파일 받기
            <small>기존 방에 남기거나 보관용</small>
            <small id="dlKeepLabel" style="opacity:0.6;font-size:0.63rem"></small>
          </button>
          <button class="dl-btn dl-fresh" onclick="downloadSplit('del')">
            🏠 새시작 파일 받기
            <small>Risu에 새로 넣을 최신 대화</small>
            <small id="dlDelLabel" style="opacity:0.6;font-size:0.63rem"></small>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="cc-notif"></div>

<script>
let messages = [];
let tokenTotal = 0;
let rawJson = null;
let uploadedFileName = 'chat';
let currentDeleteFrom = -1;

/* ── 알림 ── */
let _notifTimer = null;
function notify(text, level = 'ok') {
  const el = document.getElementById('cc-notif');
  if (!el) return;
  clearTimeout(_notifTimer);
  el.textContent = text;
  el.dataset.level = level;
  el.classList.add('visible');
  _notifTimer = setTimeout(() => el.classList.remove('visible'), level === 'err' ? 5000 : 3200);
}

/* ── 업로드 ── */
const zone     = document.getElementById('zone');
const jsonFile = document.getElementById('jsonFile');

zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});
jsonFile.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const raw = JSON.parse(ev.target.result);
      let msgs = null;
      if (raw.data && Array.isArray(raw.data.message)) msgs = raw.data.message;
      else if (Array.isArray(raw)) msgs = raw;
      else if (raw.messages && Array.isArray(raw.messages)) msgs = raw.messages;
      else {
        const found = Object.values(raw).find(v => Array.isArray(v) && v.length > 0);
        msgs = found || null;
      }
      if (!msgs || msgs.length === 0) throw new Error('메시지를 찾을 수 없습니다.');
      messages = msgs;
      rawJson  = raw;
      uploadedFileName = file.name.replace(/\.json$/i, '');
      const badge = document.getElementById('badge');
      badge.textContent = '✓ ' + file.name + ' — ' + msgs.length + '개 메시지';
      badge.classList.add('show');
      checkReady();
      notify('✓ ' + file.name + ' 로드 완료 (' + msgs.length + '개 메시지)');
    } catch(e) {
      notify('JSON 오류: ' + e.message, 'err');
    }
  };
  reader.readAsText(file);
}

/* ── 토큰 붙여넣기 ── */
document.getElementById('tokenPaste').addEventListener('input', parseTokens);
document.getElementById('maxCtx').addEventListener('input', () => { updateProg(); checkReady(); });

function parseTokens() {
  const raw = document.getElementById('tokenPaste').value.trim();
  if (!raw) {
    tokenTotal = 0;
    document.getElementById('parsed').classList.remove('show');
    checkReady();
    return;
  }
  const lines   = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const entries = [];
  for (let i = 0; i < lines.length - 1; i++) {
    const m = lines[i+1].match(/^([\d,]+)\s*[Tt]okens?/);
    if (m) { entries.push([lines[i], parseInt(m[1].replace(/,/g,''))]); i++; }
  }
  if (!entries.length) {
    let idx = 0;
    for (const m of raw.matchAll(/([\d,]+)\s*[Tt]okens?/g))
      entries.push(['항목'+(++idx), parseInt(m[1].replace(/,/g,''))]);
  }
  tokenTotal = entries.reduce((a,[,v]) => a+v, 0);
  document.getElementById('tRows').innerHTML = entries.map(([k,v]) =>
    `<div class="t-row"><span class="t-name">${k}</span><span class="t-val">${v.toLocaleString()}</span></div>`
  ).join('');
  document.getElementById('tTotal').textContent = tokenTotal.toLocaleString() + ' tokens';
  document.getElementById('parsed').classList.add('show');
  updateProg();
  checkReady();
}

function updateProg() {
  if (!tokenTotal) return;
  const max = parseInt(document.getElementById('maxCtx').value) || 150000;
  const pct = Math.min(100, tokenTotal / max * 100);
  const fill = document.getElementById('progFill');
  fill.style.width      = pct.toFixed(1) + '%';
  fill.style.background = pct > 90 ? '#e05c2a' : pct > 75 ? '#d4a020' : '#5a9e3a';
  document.getElementById('progPct').textContent = pct.toFixed(1) + '%';
}

function checkReady() {
  document.getElementById('runBtn').disabled = !(messages.length > 0 && tokenTotal > 0);
}

/* ── 계산 ── */
document.getElementById('runBtn').addEventListener('click', () => {
  const max      = parseInt(document.getElementById('maxCtx').value) || 150000;
  const overflow = tokenTotal - max;
  const pct      = (tokenTotal / max * 100).toFixed(1);
  const isOver   = overflow > 0;
  const isWarn   = !isOver && tokenTotal / max > 0.8;

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-box">
      <div class="sl">토큰 사용량</div>
      <div class="sv">${tokenTotal.toLocaleString()}</div>
    </div>
    <div class="stat-box">
      <div class="sl">최대 컨텍스트</div>
      <div class="sv">${max.toLocaleString()}</div>
    </div>
    <div class="stat-box ${isOver?'danger':isWarn?'warn':'ok'}">
      <div class="sl">사용률</div>
      <div class="sv">${pct}%</div>
    </div>`;

  /* 메시지별 토큰 추정 */
  function estimateTokensText(text) {
    let t = 0;
    for (const ch of text) {
      const cp = ch.codePointAt(0);
      if      (cp >= 0xAC00 && cp <= 0xD7A3) t += 2.5;
      else if (cp >= 0x1100 && cp <= 0x11FF) t += 2.5;
      else if (cp >= 0x3130 && cp <= 0x318F) t += 2.5;
      else if ((cp >= 0x41 && cp <= 0x5A) ||
               (cp >= 0x61 && cp <= 0x7A) ||
               (cp >= 0x30 && cp <= 0x39) ||
               cp === 0x20) t += 0.4;
      else if (cp >= 0x4E00 && cp <= 0x9FFF) t += 2.0;
      else t += 1.0;
    }
    return Math.round(t);
  }

  const rawEst    = messages.map(m => Math.max(1, estimateTokensText(m.data || '')));
  const rawTotal  = rawEst.reduce((a,b) => a+b, 0) || 1;
  const floored   = rawEst.map(v => Math.floor(v / rawTotal * tokenTotal));
  const remainder = tokenTotal - floored.reduce((a,b) => a+b, 0);
  floored[floored.indexOf(Math.max(...floored))] += remainder;
  const msgTokens = floored;
  const hasExactTokens = messages.some(m => m.generationInfo?.inputTokens != null);

  let deleteFrom = messages.length;
  if (isOver) {
    const tokensNeeded = overflow * 1.20;
    let freed = 0;
    for (let i = messages.length - 1; i >= 0; i--) {
      freed += msgTokens[i];
      if (freed >= tokensNeeded) { deleteFrom = i; break; }
    }
  }
  currentDeleteFrom = deleteFrom;

  /* 가이드 박스 */
  const guideEl = document.getElementById('guide');
  if (!isOver) {
    guideEl.className = 'guide ' + (isWarn ? 'warn' : 'safe');
    guideEl.innerHTML = `<h4>${isWarn ? '⚠ 곧 정리가 필요합니다' : '✓ 컨텍스트 여유 있음'}</h4>
      남은 여유: <code>${(max-tokenTotal).toLocaleString()} tokens</code><br>
      전체 메시지: <code>${messages.length}개</code> (index 1 ~ ${messages.length})<br>
      토큰 측정: <code>${hasExactTokens ? '실측 (inputTokens)' : '추정 (언어 가중치)'}</code><br>
      ${isWarn ? '80%를 초과했습니다. 다음 대화 전에 정리를 고려하세요.' : '아직 삭제할 필요 없습니다.'}`;
    document.getElementById('msgSection').style.display = 'none';
    document.getElementById('dlSection').style.display  = 'none';
  } else {
    const keepCount = deleteFrom;
    const delCount  = messages.length - deleteFrom;
    guideEl.className = 'guide over';
    guideEl.innerHTML = `<h4>✗ 컨텍스트 초과 — 메시지 삭제 필요</h4>
      초과량: <code>${overflow.toLocaleString()} tokens</code><br>
      전체 메시지: <code>${messages.length}개</code><br><br>
      🗂 <strong>과거백업 (기존 방 보관):</strong> index <code>1 ~ ${keepCount}</code> · <code>${keepCount}개</code><br>
      🏠 <strong>새시작 (Risu에 새로 넣기):</strong> index <code>${deleteFrom + 1} ~ ${messages.length}</code> · <code>${delCount}개</code><br><br>
      <span style="font-size:0.74rem;opacity:0.65">※ 글자 수 비율 기반 추정 (20% 안전 마진). 삭제 후 앱에서 토큰을 새로 확인하세요.</span>`;

    const tbody = document.getElementById('msgBody');
    tbody.innerHTML = messages.map((msg, i) => {
      const isDel    = i >= deleteFrom;
      const role     = msg.role || 'unknown';
      const preview  = (msg.data || '').replace(/^##.*$/gm,'').replace(/\n/g,' ').trim().slice(0,40) + '…';
      const roleBadge = role === 'user'
        ? '<span class="role-badge role-user">유저</span>'
        : '<span class="role-badge role-char">캐릭터</span>';
      const status = isDel
        ? '<span style="color:#1e3a5f;font-weight:700;font-size:0.73rem">🏠 새시작</span>'
        : '<span style="color:#6b7280;font-weight:700;font-size:0.73rem">🗂 과거백업</span>';
      return `<tr class="${isDel?'del':'keep'}">
        <td>${i+1}</td>
        <td>${roleBadge}</td>
        <td class="preview-text">${preview}</td>
        <td>${status}</td>
      </tr>`;
    }).join('');

    document.getElementById('msgCount').textContent    = `총 ${messages.length}개`;
    document.getElementById('msgSection').style.display = 'block';
    document.getElementById('dlKeepLabel').textContent  = `index 1 ~ ${keepCount} · 총 ${keepCount}개`;
    document.getElementById('dlDelLabel').textContent   = `index ${deleteFrom+1} ~ ${messages.length} · 총 ${delCount}개`;
    document.getElementById('dlSection').style.display  = 'block';
  }

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

/* ── 오버랩 체크박스 ── */
const overlapOn   = document.getElementById('overlapOn');
const overlapN    = document.getElementById('overlapN');
const overlapDesc = document.getElementById('overlapDesc');

function refreshOverlapDesc() {
  const n = parseInt(overlapN.value) || 0;
  if (overlapOn.checked) {
    overlapDesc.innerHTML = `체크됨: 새시작 시작 지점 앞 <strong>${n}개</strong> 메시지를 포함해 생성합니다.`;
    overlapN.disabled = false;
  } else {
    overlapDesc.innerHTML = `체크 해제: 새시작은 분리 기준점부터 시작합니다.`;
    overlapN.disabled = true;
  }
}
overlapOn.addEventListener('change', refreshOverlapDesc);
overlapN.addEventListener('input',   refreshOverlapDesc);

/* ── 다운로드 ── */
function downloadSplit(type) {
  if (!rawJson)              { notify('JSON 파일이 로드되지 않았습니다.', 'err'); return; }
  if (currentDeleteFrom < 0) { notify('먼저 견적 문의하기를 눌러주세요.', 'err'); return; }

  let target;
  let suffix;
  let label;

  if (type === 'keep') {
    target = messages.slice(0, currentDeleteFrom);
    suffix = '_과거백업';
    label  = '과거백업';
  } else {
    const useOverlap = overlapOn.checked;
    const n          = Math.max(0, parseInt(overlapN.value) || 0);
    const freshStart = useOverlap ? Math.max(0, currentDeleteFrom - n) : currentDeleteFrom;
    target = messages.slice(freshStart);
    suffix = '_새시작';
    label  = '새시작';
    if (useOverlap && n > 0) {
      const actual = currentDeleteFrom - freshStart;
      notify(`✓ 새시작 파일 다운로드 완료! (앞 메시지 ${actual}개 포함, 총 ${target.length}개)`);
      _doDownload(target, suffix);
      return;
    }
  }

  notify(`✓ ${label} 파일 다운로드 완료! (${target.length}개 메시지)`);
  _doDownload(target, suffix);
}

function _doDownload(target, suffix) {
  const output = JSON.parse(JSON.stringify(rawJson));
  output.data.message = target;
  try {
    const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = uploadedFileName + suffix + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    notify('다운로드 오류: ' + e.message, 'err');
  }
}
</script>
