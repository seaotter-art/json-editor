<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Calculator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e0e0e0;
  --border2: #c8c8c8;
  --text: #1a1a1a;
  --text-muted: #666;
  --text-dim: #aaa;
  --accent: #db2777;
  --accent-light: #fdf2f8;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --warn: #d97706;
  --warn-light: #fffbeb;
  --mono: 'Courier New', Courier, monospace;
  --r: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 32px 16px 80px;
}

.wrap { max-width: 640px; margin: 0 auto; }

h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3px; }
.sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 24px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  margin-bottom: 10px;
}

.card-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.sn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 17px; height: 17px; border-radius: 50%;
  background: var(--text); color: #fff;
  font-size: 0.62rem; font-weight: 700; flex-shrink: 0;
}

/* upload */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--r);
  padding: 22px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  background: var(--bg);
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone p { font-size: 0.85rem; color: var(--text-muted); }
.upload-zone p strong { color: var(--accent); }
.upload-zone .sub2 { font-size: 0.73rem; color: var(--text-dim); margin-top: 2px; }

.file-badge {
  display: none;
  margin-top: 10px;
  padding: 6px 12px;
  background: var(--success-light);
  border: 1px solid #bbf7d0;
  border-radius: 20px;
  font-size: 0.78rem;
  color: var(--success);
  font-weight: 600;
}
.file-badge.show { display: inline-block; }

/* token paste */
textarea {
  width: 100%;
  height: 108px;
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
  color: var(--text);
  resize: none;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.75;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text-dim); }
.hint { font-size: 0.73rem; color: var(--text-muted); margin-top: 5px; }

/* parsed preview */
.parsed {
  display: none;
  margin-top: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}
.parsed.show { display: block; }
.t-row { display: flex; justify-content: space-between; font-size: 0.79rem; padding: 2px 0; }
.t-name { color: var(--text-muted); }
.t-val { font-family: var(--mono); font-weight: 700; }
.t-div { border-top: 1px solid var(--border); margin: 6px 0; }
.t-total { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; padding: 2px 0; }

/* progress */
.prog-wrap { margin-top: 10px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 0.73rem; color: var(--text-muted); margin-bottom: 3px; }
.prog-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.35s, background 0.25s; }

/* ctx input */
.ctx-row { display: flex; align-items: center; gap: 8px; }
.ctx-row label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }
input[type=number] {
  width: 130px;
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-size: 0.88rem;
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
input[type=number]:focus { border-color: var(--accent); }
.ctx-unit { font-size: 0.73rem; color: var(--text-dim); }

/* run btn */
.run-btn {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  letter-spacing: -0.01em;
}
.run-btn:hover:not(:disabled) { background: #1d4ed8; }
.run-btn:disabled { opacity: 0.38; cursor: not-allowed; }

/* results */
.results { display: none; margin-top: 10px; }
.results.show { display: block; }

.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.stat-box { padding: 13px 14px; border: 1px solid var(--border); border-radius: var(--r); background: var(--bg); }
.stat-box .sl { font-size: 0.66rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.stat-box .sv { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
.stat-box.ok { background: var(--success-light); border-color: #bbf7d0; }
.stat-box.ok .sv { color: var(--success); }
.stat-box.warn { background: var(--warn-light); border-color: #fde68a; }
.stat-box.warn .sv { color: var(--warn); }
.stat-box.danger { background: var(--danger-light); border-color: #fecaca; }
.stat-box.danger .sv { color: var(--danger); }

/* guide */
.guide {
  padding: 16px 18px;
  border-radius: var(--r);
  font-size: 0.84rem;
  line-height: 1.9;
  margin-bottom: 10px;
}
.guide.safe { background: var(--success-light); border: 1px solid #bbf7d0; color: #14532d; }
.guide.warn { background: var(--warn-light); border: 1px solid #fde68a; color: #78350f; }
.guide.over { background: var(--danger-light); border: 1px solid #fecaca; color: #7f1d1d; }
.guide h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
code {
  background: rgba(0,0,0,0.08);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.82rem;
}

/* message table */
.msg-section { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.msg-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
}
.msg-table-wrap { max-height: 320px; overflow-y: auto; }
.msg-table-wrap::-webkit-scrollbar { width: 4px; }
.msg-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th { padding: 7px 12px; background: var(--bg); border-bottom: 1px solid var(--border); text-align: left; font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }
td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.del td { background: #eff6ff; color: #1d4ed8; }
tr.del td:first-child { font-weight: 700; }
tr.keep td { background: #f9fafb; color: #6b7280; }
tr.keep td:first-child { font-weight: 700; }
.role-badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.role-user { background: #dbeafe; color: #1e40af; }
.role-char { background: #fce7f3; color: #9d174d; }
.preview-text { color: var(--text-muted); font-size: 0.75rem; }

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
.dl-btn {
  padding: 11px 10px;
  background: var(--success);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  line-height: 1.6;
  transition: background 0.15s;
  width: 100%;
}
.dl-btn:hover { background: #15803d; }
.dl-btn.dl-del { background: var(--accent); }
.dl-btn.dl-del:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="wrap">

  <h1>Context Calculator</h1>
  <p class="sub">컨텍스트 초과 시 채팅 이사 — 과거백업 / 새시작 파일 분리</p>

  <!-- Step 1: JSON -->
  <div class="card">
    <div class="card-label"><span class="sn">1</span> 채팅 JSON 업로드</div>
    <div class="upload-zone" id="zone">
      <input type="file" id="jsonFile" accept=".json">
      <p><strong>클릭하여 선택</strong>하거나 드래그</p>
      <p class="sub2">RisuAI .json 파일</p>
    </div>
    <div class="file-badge" id="badge"></div>
  </div>

  <!-- Step 2: Tokens -->
  <div class="card">
    <div class="card-label"><span class="sn">2</span> 토큰 사용량 붙여넣기</div>
    <textarea id="tokenPaste" placeholder="Character Persistant&#10;1516 Tokens&#10;Character Dynamic&#10;0 Tokens&#10;Current Chat&#10;4214 Tokens&#10;Prompt Template&#10;11728 Tokens"></textarea>
    <p class="hint">앱의 토큰 정보를 그대로 붙여넣으세요.</p>
    <div class="parsed" id="parsed">
      <div id="tRows"></div>
      <div class="t-div"></div>
      <div class="t-total"><span>Total</span><span id="tTotal" style="font-family:var(--mono)"></span></div>
      <div class="prog-wrap">
        <div class="prog-meta"><span>컨텍스트 사용률</span><span id="progPct"></span></div>
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- Step 3: Max ctx -->
  <div class="card">
    <div class="card-label"><span class="sn">3</span> 최대 컨텍스트</div>
    <div class="ctx-row">
      <label>Max Context</label>
      <input type="number" id="maxCtx" value="150000">
      <span class="ctx-unit">tokens</span>
    </div>
  </div>

  <button class="run-btn" id="runBtn" disabled>계산하기</button>

  <!-- Results -->
  <div class="results" id="results">
    <div class="card">
      <div class="card-label">결과</div>
      <div class="stat-grid" id="statGrid"></div>
      <div id="guide"></div>
      <div class="msg-section" id="msgSection" style="display:none">
        <div class="msg-head">
          <span>메시지 목록</span>
          <span id="msgCount"></span>
        </div>
        <div class="msg-table-wrap">
          <table>
            <thead><tr><th>#</th><th>역할</th><th>미리보기</th><th>상태</th></tr></thead>
            <tbody id="msgBody"></tbody>
          </table>
        </div>
      </div>
      <!-- Download buttons -->
      <div id="dlSection" style="display:none; margin-top:10px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <button class="dl-btn dl-del" id="dlDel" onclick="downloadSplit('del')">
            🏠 새시작 파일 받기<br>
            <span style="font-size:0.7rem;font-weight:400;opacity:0.75">Risu에 새로 넣을 최신 대화</span><br>
            <span id="dlDelLabel" style="font-size:0.68rem;font-weight:400;opacity:0.6"></span>
          </button>
          <button class="dl-btn" id="dlKeep" onclick="downloadSplit('keep')">
            🗂 과거백업 파일 받기<br>
            <span style="font-size:0.7rem;font-weight:400;opacity:0.75">기존 방에 남기거나 보관용</span><br>
            <span id="dlKeepLabel" style="font-size:0.68rem;font-weight:400;opacity:0.6"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
let messages = [];
let tokenTotal = 0;
let rawJson = null;  // 원본 JSON 전체 보존 (다운로드용)
let uploadedFileName = 'chat';

// ── upload ──
const zone = document.getElementById('zone');
const jsonFile = document.getElementById('jsonFile');

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
jsonFile.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const raw = JSON.parse(ev.target.result);
      let msgs = null;
      if (raw.data && Array.isArray(raw.data.message)) msgs = raw.data.message;
      else if (Array.isArray(raw)) msgs = raw;
      else if (raw.messages && Array.isArray(raw.messages)) msgs = raw.messages;
      else {
        const found = Object.values(raw).find(v => Array.isArray(v) && v.length > 0);
        msgs = found || null;
      }
      if (!msgs || msgs.length === 0) throw new Error('메시지를 찾을 수 없습니다.');
      messages = msgs;
      rawJson = raw;
      uploadedFileName = file.name.replace(/\.json$/i, '');
      const badge = document.getElementById('badge');
      badge.textContent = '✓ ' + file.name + ' — ' + msgs.length + '개 메시지';
      badge.classList.add('show');
      checkReady();
    } catch(e) {
      alert('JSON 오류: ' + e.message);
    }
  };
  reader.readAsText(file);
}

// ── token paste ──
document.getElementById('tokenPaste').addEventListener('input', parseTokens);
document.getElementById('maxCtx').addEventListener('input', () => { updateProg(); checkReady(); });

function parseTokens() {
  const raw = document.getElementById('tokenPaste').value.trim();
  if (!raw) { tokenTotal = 0; document.getElementById('parsed').classList.remove('show'); checkReady(); return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const entries = [];
  for (let i = 0; i < lines.length - 1; i++) {
    const m = lines[i+1].match(/^([\d,]+)\s*[Tt]okens?/);
    if (m) { entries.push([lines[i], parseInt(m[1].replace(/,/g,''))]); i++; }
  }
  if (!entries.length) {
    // fallback
    let idx = 0;
    for (const m of raw.matchAll(/([\d,]+)\s*[Tt]okens?/g)) entries.push(['항목'+(++idx), parseInt(m[1].replace(/,/g,''))]);
  }

  tokenTotal = entries.reduce((a,[,v])=>a+v,0);
  document.getElementById('tRows').innerHTML = entries.map(([k,v])=>
    `<div class="t-row"><span class="t-name">${k}</span><span class="t-val">${v.toLocaleString()}</span></div>`
  ).join('');
  document.getElementById('tTotal').textContent = tokenTotal.toLocaleString() + ' tokens';
  document.getElementById('parsed').classList.add('show');
  updateProg();
  checkReady();
}

function updateProg() {
  if (!tokenTotal) return;
  const max = parseInt(document.getElementById('maxCtx').value) || 150000;
  const pct = Math.min(100, tokenTotal / max * 100);
  const fill = document.getElementById('progFill');
  fill.style.width = pct.toFixed(1) + '%';
  fill.style.background = pct > 90 ? '#dc2626' : pct > 75 ? '#d97706' : '#16a34a';
  document.getElementById('progPct').textContent = pct.toFixed(1) + '%';
}

function checkReady() {
  document.getElementById('runBtn').disabled = !(messages.length > 0 && tokenTotal > 0);
}

// ── calculate ──
document.getElementById('runBtn').addEventListener('click', () => {
  const max = parseInt(document.getElementById('maxCtx').value) || 150000;
  const overflow = tokenTotal - max;
  const pct = (tokenTotal / max * 100).toFixed(1);
  const isOver = overflow > 0;
  const isWarn = !isOver && tokenTotal / max > 0.8;

  // stat grid
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-box">
      <div class="sl">토큰 사용량</div>
      <div class="sv">${tokenTotal.toLocaleString()}</div>
    </div>
    <div class="stat-box">
      <div class="sl">최대 컨텍스트</div>
      <div class="sv">${max.toLocaleString()}</div>
    </div>
    <div class="stat-box ${isOver?'danger':isWarn?'warn':'ok'}">
      <div class="sl">사용률</div>
      <div class="sv">${pct}%</div>
    </div>`;

  // ── 메시지별 실제 토큰 산출 ──
  // char 메시지의 generationInfo.inputTokens = 해당 턴까지의 누적 컨텍스트 토큰
  // 인접한 두 char 메시지의 inputTokens 차이 = 그 사이 메시지들의 실제 토큰
  // inputTokens 없는 JSON은 언어 가중치 추정으로 폴백
  function estimateTokensText(text) {
    let t = 0;
    for (const ch of text) {
      const cp = ch.codePointAt(0);
      if (cp >= 0xAC00 && cp <= 0xD7A3) t += 2.5;
      else if (cp >= 0x1100 && cp <= 0x11FF) t += 2.5;
      else if (cp >= 0x3130 && cp <= 0x318F) t += 2.5;
      else if ((cp >= 0x41 && cp <= 0x5A) ||
               (cp >= 0x61 && cp <= 0x7A) ||
               (cp >= 0x30 && cp <= 0x39) ||
               cp === 0x20) t += 0.4;
      else if (cp >= 0x4E00 && cp <= 0x9FFF) t += 2.0;
      else t += 1.0;
    }
    return Math.round(t);
  }

  // 각 메시지 글자 수 비율로 tokenTotal을 정확히 분배
  // → msgTokens 합계가 정확히 tokenTotal이 되므로
  //   삭제 후 재계산 시 수렴 보장
  const rawEst = messages.map(m => Math.max(1, estimateTokensText(m.data || '')));
  const rawTotal = rawEst.reduce((a, b) => a + b, 0) || 1;
  const floored = rawEst.map(v => Math.floor(v / rawTotal * tokenTotal));
  const remainder = tokenTotal - floored.reduce((a, b) => a + b, 0);
  floored[floored.indexOf(Math.max(...floored))] += remainder;
  const msgTokens = floored;
  const hasExactTokens = messages.some(m => m.generationInfo?.inputTokens != null);

  // find delete boundary (from the END — 최신 메시지부터 삭제)
  let deleteFrom = messages.length; // 0-based, 이 인덱스부터 끝까지 삭제
  if (isOver) {
    const tokensNeeded = overflow * 1.20;  // 20% 안전 마진 (글자 수 추정 오차 보정)
    let freed = 0;
    for (let i = messages.length - 1; i >= 0; i--) {
      freed += msgTokens[i];
      if (freed >= tokensNeeded) { deleteFrom = i; break; }
    }
  }
  currentDeleteFrom = deleteFrom; // 전역 저장 — 다운로드에서 사용

  // guide box
  const guideEl = document.getElementById('guide');
  if (!isOver) {
    guideEl.className = 'guide ' + (isWarn ? 'warn' : 'safe');
    guideEl.innerHTML = `<h4>${isWarn ? '⚠ 곧 정리가 필요합니다' : '✓ 컨텍스트 여유 있음'}</h4>
      남은 여유: <code>${(max-tokenTotal).toLocaleString()} tokens</code><br>
      전체 메시지: <code>${messages.length}개</code> (index 1 ~ ${messages.length})<br>
      토큰 측정: <code>${hasExactTokens ? "실측 (inputTokens)" : "추정 (언어 가중치)"}</code><br>
      ${isWarn ? '80%를 초과했습니다. 다음 대화 전에 정리를 고려하세요.' : '아직 삭제할 필요 없습니다.'}`;
    document.getElementById('msgSection').style.display = 'none';
  } else {
    const keepCount = deleteFrom;           // 유지할 메시지 수 (0-based index = 개수)
    const delCount  = messages.length - deleteFrom;
    guideEl.className = 'guide over';
    guideEl.innerHTML = `<h4>✗ 컨텍스트 초과 — 메시지 삭제 필요</h4>
      초과량: <code>${overflow.toLocaleString()} tokens</code><br>
      전체 메시지: <code>${messages.length}개</code><br>
      <br>
      🗂 <strong>과거백업 (기존 방 보관):</strong> index <code>1 ~ ${keepCount}</code> · <code>${keepCount}개</code><br>
      🏠 <strong>새시작 (Risu에 새로 넣기):</strong> index <code>${deleteFrom + 1} ~ ${messages.length}</code> · <code>${delCount}개</code><br>
      <br>
      <span style="font-size:0.76rem;opacity:0.65">※ 메시지 글자 수 비율 기반 추정 (20% 안전 마진 포함). 삭제 후 앱에서 토큰을 새로 확인하여 재계산하세요.</span>`;

    // message table
    const tbody = document.getElementById('msgBody');
    tbody.innerHTML = messages.map((msg, i) => {
      const idx = i + 1;
      const isDel = i >= deleteFrom;
      const role = msg.role || 'unknown';
      const preview = (msg.data || '').replace(/^##.*$/gm,'').replace(/\n/g,' ').trim().slice(0,40) + '…';
      const roleBadge = role === 'user'
        ? '<span class="role-badge role-user">유저</span>'
        : '<span class="role-badge role-char">캐릭터</span>';
      const status = isDel
        ? '<span style="color:#2563eb;font-weight:700;font-size:0.75rem">🏠 새시작</span>'
        : '<span style="color:#6b7280;font-weight:700;font-size:0.75rem">🗂 과거백업</span>';
      return `<tr class="${isDel?'del':'keep'}">
        <td>${idx}</td>
        <td>${roleBadge}</td>
        <td class="preview-text">${preview}</td>
        <td>${status}</td>
      </tr>`;
    }).join('');

    document.getElementById('msgCount').textContent = `총 ${messages.length}개`;
    document.getElementById('msgSection').style.display = 'block';

    // 다운로드 버튼 업데이트
    document.getElementById('dlKeepLabel').textContent = `index 1 ~ ${keepCount} · 총 ${keepCount}개`;
    document.getElementById('dlDelLabel').textContent  = `index ${deleteFrom+1} ~ ${messages.length} · 총 ${delCount}개`;
    document.getElementById('dlSection').style.display = 'block';
  }

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ── download split ──
let currentDeleteFrom = -1;

function downloadSplit(type) {
  if (!rawJson) { alert('JSON 파일이 로드되지 않았습니다.'); return; }
  if (currentDeleteFrom < 0) { alert('먼저 계산하기를 눌러주세요.'); return; }

  const keepMsgs = messages.slice(0, currentDeleteFrom);
  const delMsgs  = messages.slice(currentDeleteFrom);
  const target   = type === 'keep' ? keepMsgs : delMsgs;
  const suffix   = type === 'keep' ? '_과거백업' : '_새시작';

  // 원본 구조 딥카피 후 message만 교체
  const output = JSON.parse(JSON.stringify(rawJson));
  output.data.message = target;

  try {
    const jsonContent = JSON.stringify(output, null, 2);
    const blob = new Blob([jsonContent], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = uploadedFileName + suffix + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('다운로드 오류: ' + e.message);
  }
}
</script>
